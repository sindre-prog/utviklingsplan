<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Utviklingsplan | Coaching Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main id="root">
    <section class="auth-screen" data-screen="login">
      <div class="brand-mark" aria-hidden="true">U</div>
      <form class="auth-panel" id="login-form">
        <div>
          <p class="eyebrow">Coaching Studio</p>
          <h1>Utviklingsplan</h1>
          <p class="muted">Logg inn for å følge mål, sesjoner og refleksjoner på ett sted.</p>
        </div>
        <label>E-post <input id="login-email" type="email" autocomplete="email" placeholder="din@epost.no" required></label>
        <label>Passord <input id="login-password" type="password" autocomplete="current-password" placeholder="Passord" required></label>
        <button class="button primary" type="submit"><i data-lucide="log-in"></i><span>Logg inn</span></button>
        <button class="text-button" id="forgot-password" type="button">Glemt passord?</button>
        <p class="form-message" id="login-message" role="status"></p>
      </form>
    </section>

    <section class="auth-screen hidden" data-screen="password">
      <div class="brand-mark" aria-hidden="true">U</div>
      <form class="auth-panel" id="password-form">
        <div>
          <p class="eyebrow">Invitasjon</p>
          <h1>Sett passord</h1>
          <p class="muted">Velg et passord for portalen.</p>
        </div>
        <label>Nytt passord <input id="new-password" type="password" minlength="8" placeholder="Minst 8 tegn" required></label>
        <label>Bekreft passord <input id="confirm-password" type="password" minlength="8" placeholder="Gjenta passordet" required></label>
        <button class="button primary" type="submit"><i data-lucide="key-round"></i><span>Aktiver konto</span></button>
        <p class="form-message" id="password-message" role="status"></p>
      </form>
    </section>

    <section class="app-shell hidden" data-screen="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark small" aria-hidden="true">U</div>
          <div><strong>Utviklingsplan</strong><span>Coaching Studio</span></div>
        </div>
        <nav class="nav-list" id="nav-list" aria-label="Hovednavigasjon"></nav>
        <div class="sidebar-user">
          <div>
            <strong id="user-name">-</strong>
            <span id="user-role">-</span>
          </div>
          <button class="icon-button" id="logout-button" title="Logg ut"><i data-lucide="log-out"></i></button>
        </div>
      </aside>

      <div class="workspace">
        <header class="topline">
          <button class="icon-button mobile-only" id="mobile-menu" title="Meny"><i data-lucide="menu"></i></button>
          <div>
            <p class="eyebrow" id="view-kicker">Oversikt</p>
            <h2 id="view-title">Dashboard</h2>
          </div>
          <div class="topline-actions" id="topline-actions"></div>
        </header>
        <section class="content" id="content" aria-live="polite"></section>
      </div>
    </section>
  </main>

  <dialog class="modal" id="entity-modal">
    <form method="dialog" class="modal-panel" id="entity-form">
      <div class="modal-head">
        <div><p class="eyebrow" id="modal-kicker">Rediger</p><h3 id="modal-title">Detaljer</h3></div>
        <button class="icon-button" value="cancel" title="Lukk"><i data-lucide="x"></i></button>
      </div>
      <div id="modal-fields"></div>
      <p class="form-message" id="modal-message"></p>
      <div class="modal-actions">
        <button class="button ghost" value="cancel">Avbryt</button>
        <button class="button primary" id="modal-save" value="default"><i data-lucide="save"></i><span>Lagre</span></button>
      </div>
    </form>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
